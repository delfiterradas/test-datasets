[Version]
  version = 1.8
  name = svrank_model

[Categories]
 [[variant_length]]
    category_aggregation = min

[sv_len]
  category = variant_length
  data_type = integer
  description = The length of the structural variant
  field = INFO
  info_key = SVLEN
  record_rule = min
  separators = ',',

  [[not_reported]]
    score = 0

  [[long_pos]]
    score = 3
    lower = 1000001
    upper = 100000000

  [[long_neg]]
    score = 3
    lower = -100000000
    upper = -1000001

  [[medium_pos]]
    score = 3
    lower = 50001
    upper = 1000000

  [[medium_neg]]
    score = 3
    lower = -1000000
    upper = -50001